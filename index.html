<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QC Interview — Log in</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%A4%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/css/theme.css" />
</head>
<body>
  <div class="center">
    <div class="card stack" style="max-width: 420px; width: 100%;">
      <div>
        <h1>.NET Practice Interview</h1>
        <p class="muted">AI-graded, spoken practice for the .NET Full Stack + Test Automation cohort. Enter the passcode from your invite email.</p>
      </div>
      <div>
        <label for="code">Passcode</label>
        <input id="code" type="text" autocomplete="one-time-code" placeholder="XXXX-XXXX-XXXX" spellcheck="false" />
      </div>
      <button id="go" class="btn big" style="width:100%">Log in</button>
      <p id="err" class="small hidden" style="color: var(--bad)"></p>
      <p class="small muted">Lost your passcode? Ask your trainer to resend it.</p>
    </div>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
